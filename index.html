<script>

// ══════════════════════════════════════════════
//  GLOBALS
// ══════════════════════════════════════════════
let SQL = null, db = null;
let decks = {};           // did -> {name, cards[]}
let mediaFiles = {};      // filename -> base64 url
let fieldConfigs = {};    // did -> {front: fieldName, back: [fieldName...], hidden: [fieldName...]}
let studyQueue = [], studyIdx = 0, curCard = null, flipped = false;
let sessionStats = {again:0,hard:0,good:0,easy:0};
let ghConfig = {token:'', repo:'', user:''};
let syncState = 'idle';
let userSettings = {
  theme: 'auto',       // 'auto' | 'dark' | 'light'
  newPerDeck: 20,      // max new cards per session
  newOrder: 'ordered', // 'ordered' | 'random'
  editMode: false,     // show field config buttons
};

const PROGRESS_KEY  = 'kj_progress_v3';
const FIELDCFG_KEY  = 'kj_fields_v3';
const GH_KEY        = 'kj_github_v2';
const SETTINGS_KEY  = 'kj_settings_v1';
let progress = {};

// ══════════════════════════════════════════════
//  FSRS-LITE
// ══════════════════════════════════════════════
const R={again:1,hard:2,good:3,easy:4};
function schedule(st={},rating){
  let{interval=0,ease=2.5,reps=0,lapses=0,type=0}=st;
  if(type<2){
    if(rating===1){interval=0;type=1}
    else if(rating===2){interval=1/24/6;type=1}   // 10 min
    else if(rating===3){interval=1/24;type=1}      // 1 hour -> enters review
    else{interval=1;type=2;reps=1}
  }else{
    if(rating===1){lapses++;interval=1;ease=Math.max(1.3,ease-.2);type=1}
    else{
      let ni=rating===2?interval*ease*.8:rating===3?interval*ease:interval*ease*1.3;
      ease=rating===2?Math.max(1.3,ease-.15):rating===4?Math.min(3,ease+.15):ease;
      interval=Math.max(1,Math.round(ni));reps++;type=2;
    }
  }
  const ms=interval<1?interval*86400000:interval*86400000;
  return{interval,ease,reps,lapses,type,due:Date.now()+ms};
}
function isDue(st){return!st||Date.now()>=st.due}
function intervalLabel(st,r){
  const s=schedule(st||{},r),ms=s.due-Date.now();
  if(ms<60000)return '<1m';
  if(ms<3600000)return Math.round(ms/60000)+'m';
  if(ms<86400000)return Math.round(ms/3600000)+'h';
  return Math.round(ms/86400000)+'d';
}

const GH_FILE = 'kanji-progress.json';

async function ghRequest(method, path, body=null){
  const {token, repo, user} = ghConfig;
  if(!token||!repo||!user) throw new Error('GitHub nicht konfiguriert');
  const url = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const headers = {
    'Authorization': `token ${token}`,
    'Content-Type': 'application/json',
    'X-GitHub-Api-Version': '2022-11-28'
  };
  const opts = {method, headers};
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if(!res.ok && res.status !== 404) throw new Error(`GitHub ${res.status}: ${res.statusText}`);
  if(res.status === 404) return null;
  return res.json();
}

async function ghPush(){
  if(!ghConfig.token) return;
  setSyncState('syncing');
  try{
    const ts = new Date().toISOString();

    // Push progress
    const progressContent = btoa(unescape(encodeURIComponent(JSON.stringify(progress))));
    const existingProgress = await ghRequest('GET', GH_FILE);
    await ghRequest('PUT', GH_FILE, {
      message: `Sync ${ts}`,
      content: progressContent,
      ...(existingProgress?.sha ? {sha: existingProgress.sha} : {})
    });

    // Push field configs
    const fieldsContent = btoa(unescape(encodeURIComponent(JSON.stringify(fieldConfigs))));
    const existingFields = await ghRequest('GET', 'kanji-fields.json');
    await ghRequest('PUT', 'kanji-fields.json', {
      message: `Fields sync ${ts}`,
      content: fieldsContent,
      ...(existingFields?.sha ? {sha: existingFields.sha} : {})
    });

    setSyncState('synced');
  }catch(e){
    setSyncState('error');
    console.warn('GitHub push failed:', e);
  }
}

async function ghPull(){
  if(!ghConfig.token) return;
  setSyncState('syncing');
  try{
    // Pull progress
    const file = await ghRequest('GET', GH_FILE);
    if(file?.content){
      const json = decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
      const remote = JSON.parse(json);
      for(const [k,rv] of Object.entries(remote)){
        if(!progress[k]||progress[k].due<rv.due) progress[k]=rv;
      }
    }

    // Pull field configs
    const fieldsFile = await ghRequest('GET', 'kanji-fields.json');
    if(fieldsFile?.content){
      const fieldsJson = decodeURIComponent(escape(atob(fieldsFile.content.replace(/\n/g,''))));
      const remoteFields = JSON.parse(fieldsJson);
      for(const [did, cfg] of Object.entries(remoteFields)){
        fieldConfigs[did] = cfg;
      }
    }

    saveLocal();
    setSyncState('synced');
    toast('☁️ Synchronisiert!');
  }catch(e){
    setSyncState('error');
    console.warn('GitHub pull failed:', e);
  }
}

function setSyncState(state){
  syncState = state;
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if(!dot) return;
  dot.className = 'sync-dot ' + (state==='idle'?'':state);
  lbl.textContent = state==='syncing'?'…':state==='synced'?'Sync ✓':state==='error'?'Sync ✗':'';
}

// Auto-push after rating with debounce
let pushTimer;
function schedulePush(){
  if(!ghConfig.token) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(ghPush, 3000);
}

async function importApkg(file){
  showLoader('Importieren…');
  try{
    setMsg('Entpacken…');
    const zip = await JSZip.loadAsync(file);

    const dbEntry = zip.file('collection.anki21') || zip.file('collection.anki2') || zip.file('collection.anki21b');
    if(!dbEntry) throw new Error('Keine Anki-Datenbank gefunden.');
    setMsg('Datenbank lesen…');
    const buf = await dbEntry.async('arraybuffer');
    // Use a temporary DB so we don't lose existing decks
    const newDb = new SQL.Database(new Uint8Array(buf));

    // Media files – merge into existing
    setMsg('Medien laden…');
    const mediaJson = zip.file('media');
    if(mediaJson){
      const mediaMap = JSON.parse(await mediaJson.async('string'));
      for(const [idx, name] of Object.entries(mediaMap)){
        const entry = zip.file(idx);
        if(entry){
          const blob = await entry.async('blob');
          mediaFiles[name] = URL.createObjectURL(blob);
        }
      }
    }

    setMsg('Karten laden…');
    // Merge new decks into existing decks object
    const newDecks = loadDecksFromDb(newDb);
    const prevCount = Object.keys(decks).length;
    for(const [did, deck] of Object.entries(newDecks)){
      decks[did] = deck;
    }
    // Keep a reference to the latest db for future queries
    // (store all dbs so we can query any of them)
    if(!window.allDbs) window.allDbs = [];
    window.allDbs.push(newDb);
    db = newDb; // point to latest for new imports

    const newCount = Object.keys(decks).length - prevCount;
    hideLoader();
    renderHome();
    toast('✅ ' + Object.keys(newDecks).length + ' Deck(s) importiert');
  }catch(err){
    hideLoader();
    toast('❌ '+err.message);
    console.error(err);
  }
}

function loadDecksFromDb(dbInst){
  // Returns a decks object from a given SQL db instance
  const result = {};
  const col = dbInst.exec('SELECT decks,models FROM col LIMIT 1');
  if(!col.length) return result;
  const deckDef = JSON.parse(col[0].values[0][0]);
  const modelDef = JSON.parse(col[0].values[0][1]);

  const models = {};
  for(const[mid,m] of Object.entries(modelDef)){
    models[mid] = {name:m.name, fields:m.flds.map(f=>f.name)};
  }

  const rows = dbInst.exec(`
    SELECT c.id,c.nid,c.did,c.ord,c.type,n.mid,n.flds,n.tags
    FROM cards c JOIN notes n ON c.nid=n.id
  `);
  if(!rows.length) return result;

  for(const[cid,nid,did,ord,type,mid,flds,tags] of rows[0].values){
    const dn = deckDef[did]?.name || 'Unbekannt';
    if(!result[did]) result[did]={name:dn,cards:[],fields:[]};
    const model = models[mid]||{fields:[]};
    const vals = flds.split('\x1f');
    const fields={};
    model.fields.forEach((n,i)=>fields[n]=vals[i]||'');
    if(!result[did].fields.length) result[did].fields=model.fields;
    result[did].cards.push({cid,nid,did,ord,type,fields,tags:tags||''});
  }
  return result;
}

function loadDecks(){
  // Load from current db and merge into global decks
  const newDecks = loadDecksFromDb(db);
  for(const [did, deck] of Object.entries(newDecks)){
    decks[did] = deck;
  }
}

function getFieldConfig(did){
  if(fieldConfigs[did]){
    const cfg = fieldConfigs[did];
    // Migrate old single-string front to array
    if(typeof cfg.front === 'string') cfg.front = cfg.front ? [cfg.front] : [];
    return cfg;
  }
  const deck = decks[did];
  if(!deck) return {front:[],back:[],hidden:[]};
  const fields = deck.fields;
  const frontCandidates = ['Expression','Front','Word','Vocab','単語','表現','Kanji','漢字','Question','Term'];
  const hiddenCandidates = ['Index','Frequency','optimized voc index','voc index','Optimized Voc Index','Note ID','ID','Notes','Diagram','Stroke Order','Stroke','KanjiReadings'];
  let front = fields[0];
  for(const c of frontCandidates){ if(fields.includes(c)){front=c;break} }
  const hidden = fields.filter(f=>hiddenCandidates.some(h=>f.toLowerCase().includes(h.toLowerCase())));
  const back = fields.filter(f=>f!==front && !hidden.includes(f));
  return {front:[front], back, hidden};
}

function buildDeckTree() {
  // Build tree from flat deck list using :: separator
  const tree = {}; // rootName -> {did, name, children:{}, cards:[]}

  for(const [did, deck] of Object.entries(decks)) {
    const parts = deck.name.split('::');
    let node = tree;
    let path = '';
    for(let i=0; i<parts.length; i++) {
      const part = parts[i];
      path = path ? path+'::'+part : part;
      if(!node[part]) node[part] = {did: null, fullName: path, displayName: part, children: {}, allCards: []};
      if(i === parts.length-1) node[part].did = did; // leaf
      // accumulate all cards up the tree
      node[part].allCards.push(...deck.cards);
      node = node[part].children;
    }
  }
  return tree;
}

function getAllCardsForNode(node) {
  let cards = [...(node.allCards||[])];
  for(const child of Object.values(node.children||{})) {
    cards.push(...getAllCardsForNode(child));
  }
  // Deduplicate by card id
  const seen = new Set();
  return cards.filter(c => { if(seen.has(c.cid)) return false; seen.add(c.cid); return true; });
}

function renderDeckNode(node, depth=0) {
  const hasChildren = Object.keys(node.children).length > 0;
  const cards = node.allCards;
  const {newC,lrnC,revC} = getCounts(cards);
  const EMOJIS = ['🎌','📖','✍️','🗾','📝','🎋','⛩️','🌸','📚','🈳'];
  const emoji = EMOJIS[Math.abs(node.fullName.length * 7) % EMOJIS.length];
  const indent = depth * 16;
  const nodeId = 'node_' + node.fullName.replace(/[^a-zA-Z0-9]/g,'_');

  let html = '';

  if(hasChildren) {
    // Parent node – collapsible
    html += `<div class="deck-card deck-parent" style="margin-left:${indent}px" onclick="toggleDeckNode('${nodeId}')">
      <span class="deck-emoji">${emoji}</span>
      <div class="deck-info">
        <div class="deck-name">${esc(node.displayName)}</div>
        <div class="deck-sub">${cards.length} Karten total</div>
        <div class="deck-pills">
          <span class="pill ${newC?'pill-new':'pill-0'}">${newC} neu</span>
          <span class="pill ${lrnC?'pill-lrn':'pill-0'}">${lrnC} lernen</span>
          <span class="pill ${revC?'pill-rev':'pill-0'}">${revC} wdh.</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <div style="display:flex;gap:6px;align-items:center">
          ${userSettings.editMode ? `<button onclick="event.stopPropagation();showFieldModalForGroup('${esc(node.fullName)}')"
            style="background:#20202c;color:#a89fff;border:1.5px solid #2c2c3e;border-radius:10px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">
            ⚙️ Felder
          </button>` : ''}
          <button onclick="event.stopPropagation();startStudyCards(getAllCardsForNodeByName('${esc(node.fullName)}'),'${esc(node.displayName)}')"
            style="background:#6e66ff;color:#fff;border:none;border-radius:10px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">
            ▶ Alle lernen
          </button>
        </div>
        <span class="deck-arr" id="${nodeId}_arrow">›</span>
      </div>
    </div>`;
    // Children container
    html += `<div id="${nodeId}_children" style="display:none">`;
    for(const child of Object.values(node.children)) {
      html += renderDeckNode(child, depth+1);
    }
    // Also show the parent deck itself if it has its own cards (did set)
    if(node.did) {
      html += renderLeafDeck(node.did, decks[node.did], depth+1);
    }
    html += `</div>`;
  } else {
    // Leaf node
    if(node.did) html += renderLeafDeck(node.did, decks[node.did], depth);
  }
  return html;
}

function renderLeafDeck(did, deck, depth=0) {
  const {newC,lrnC,revC} = getCounts(deck.cards);
  const EMOJIS = ['🎌','📖','✍️','🗾','📝','🎋','⛩️','🌸','📚','🈳'];
  const emoji = EMOJIS[Math.abs(did * 7) % EMOJIS.length];
  const indent = depth * 16;
  const name = deck.name.split('::').pop();
  return `<div class="deck-card" style="margin-left:${indent}px" onclick="startStudy('${did}')">
    <span class="deck-emoji" style="font-size:22px">${emoji}</span>
    <div class="deck-info">
      <div class="deck-name" style="font-size:14px">${esc(name)}</div>
      <div class="deck-sub">${deck.cards.length} Karten${userSettings.editMode ? ' · <span style="cursor:pointer;color:#a89fff;text-decoration:underline" onclick="event.stopPropagation();showFieldModal(\'' + did + '\')">Felder</span>' : ''}</div>
      <div class="deck-pills">
        <span class="pill ${newC?'pill-new':'pill-0'}">${newC} neu</span>
        <span class="pill ${lrnC?'pill-lrn':'pill-0'}">${lrnC} lernen</span>
        <span class="pill ${revC?'pill-rev':'pill-0'}">${revC} wdh.</span>
      </div>
    </div>
    <span class="deck-arr">›</span>
  </div>`;
}

function toggleDeckNode(nodeId) {
  const el = document.getElementById(nodeId + '_children');
  const arrow = document.getElementById(nodeId + '_arrow');
  if(!el) return;
  const open = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  if(arrow) arrow.textContent = open ? '⌄' : '›';

// Cache for getAllCardsForNodeByName
function getAllCardsForNodeByName(fullName) {
  const tree = buildDeckTree();
  const parts = fullName.split('::');
  let node = tree;
  for(const p of parts) {
    if(!node[p]) return [];
    node = node[p];
    if(p === parts[parts.length-1]) return node.allCards;
    node = node.children;
  }
  return [];
}

function startStudyCards(cards, name) {
  // Deduplicate
  const seen = new Set();
  cards = cards.filter(c => { if(seen.has(c.cid)) return false; seen.add(c.cid); return true; });
  if(!cards.length) { toast('Keine Karten zum Lernen'); return; }

  sessionStats={again:0,hard:0,good:0,easy:0};
  const due=[],newCards=[];
  for(const c of cards){
    const st=getState(c.nid,c.ord);
    if(!st) newCards.push(c);
    else if(isDue(st)) due.push(c);
  }
  shuffle(due);
  if(userSettings.newOrder==='random') shuffle(newCards);
  const maxNew=userSettings.newPerDeck||20;
  studyQueue=[...due,...newCards.slice(0,maxNew)];
  studyIdx=0;

  if(!studyQueue.length){
    document.getElementById('studyTitle').textContent=name;
    showDone(true);showScreen('studyScreen');return;
  }
  document.getElementById('studyTitle').textContent=name;
  showScreen('studyScreen');
  nextCard();
}

function getCounts(cards){
  let newC=0,lrnC=0,revC=0;
  for(const c of cards){
    const st=getState(c.nid,c.ord);
    if(!st){newC++;continue}
    if(!isDue(st)) continue;
    if(st.type===2) revC++; else lrnC++;
  }
  return{newC,lrnC,revC};
}

let editingDid = null;
let tempConfig = null;

function getSubDeckIds(fullName) {
  // Get all leaf deck IDs under a given node path
  const ids = [];
  for(const [did, deck] of Object.entries(decks)){
    if(deck.name === fullName || deck.name.startsWith(fullName + '::')) {
      ids.push(did);
    }
  }
  return ids;
}

function showFieldModalForGroup(fullName) {
  // Find all sub-deck IDs under this node
  const subIds = getSubDeckIds(fullName);
  if(!subIds.length) return;

  // Use fields from first sub-deck as template
  const firstDeck = decks[subIds[0]];
  if(!firstDeck) return;

  // Use existing config of first deck as starting point
  const cfg = getFieldConfig(subIds[0]);
  editingDid = subIds[0]; // temp, overridden on save
  tempConfig = JSON.parse(JSON.stringify(cfg));

  // Store group IDs for saving
  window._editingGroupIds = subIds;

  const groupName = fullName.split('::').pop();
  document.getElementById('fieldModalTitle').textContent = '⚙️ Felder für alle: ' + groupName;
  renderFieldModal(firstDeck.fields);

  // Override save button to apply to all
  const footer = document.getElementById('fieldModal').querySelector('.modal-footer');
  footer.innerHTML = '<div style="font-size:12px;color:#8888aa;margin-bottom:10px;text-align:center">Gilt für alle ' + subIds.length + ' Unterdecks</div>' +
    '<button class="primary-btn" style="width:100%" onclick="saveFieldConfigForGroup()">Für alle speichern</button>';

  openModal('fieldModal');
}

function saveFieldConfigForGroup() {
  const ids = window._editingGroupIds || [];
  for(const did of ids) {
    fieldConfigs[did] = JSON.parse(JSON.stringify(tempConfig));
  }
  window._editingGroupIds = null;
  saveLocal();
  closeModal('fieldModal');
  // Reset footer back to normal
  const footer = document.getElementById('fieldModal').querySelector('.modal-footer');
  footer.innerHTML = '<button class="primary-btn" style="width:100%" onclick="saveFieldConfig()">Speichern</button>';
  toast('✅ Felder für alle Unterdecks gespeichert');
  renderHome();
  schedulePush();
}

function showFieldModal(did){
  editingDid = did;
  window._editingGroupIds = null;
  const deck = decks[did];
  const cfg = getFieldConfig(did);
  tempConfig = JSON.parse(JSON.stringify(cfg));

  // Reset footer to normal
  const footer = document.getElementById('fieldModal').querySelector('.modal-footer');
  footer.innerHTML = '<button class="primary-btn" style="width:100%" onclick="saveFieldConfig()">Speichern</button>';

  document.getElementById('fieldModalTitle').textContent = '⚙️ Felder: '+deck.name.split('::').pop();
  renderFieldModal(deck.fields);
  openModal('fieldModal');
}

function renderFieldModal(fields){
  // Build ordered lists: front fields in order, then back fields in order, then hidden
  if(!Array.isArray(tempConfig.front)) tempConfig.front = tempConfig.front ? [tempConfig.front] : [];
  if(!Array.isArray(tempConfig.back)) tempConfig.back = tempConfig.back || [];

  const allAssigned = [...tempConfig.front, ...tempConfig.back, ...tempConfig.hidden];
  // Add any unassigned fields to back
  for(const f of fields){ if(!allAssigned.includes(f)) tempConfig.back.push(f); }

  function fieldRow(f, role, idx, listId){
    return `<div class="field-row sortable-item" data-field="${esc(f)}" data-role="${role}" data-idx="${idx}" data-list="${listId}"
      draggable="true"
      ondragstart="dragStart(event)"
      ondragover="dragOver(event)"
      ondrop="dragDrop(event)"
      ondragend="dragEnd(event)"
      ontouchstart="touchStart(event)"
      ontouchmove="touchMove(event)"
      ontouchend="touchEnd(event)">
      <span class="field-drag">⠿</span>
      <div class="field-info">
        <div class="field-name">${esc(f)}</div>
        <div class="field-role field-role-${role}">${roleLabel(role)}</div>
      </div>
      <div class="field-actions">
        <button class="field-action-btn ${role==='front'?'active-front':''}" onclick="setFieldRole('${esc(f)}','front')">Vorne</button>
        <button class="field-action-btn ${role==='back'?'active-back':''}" onclick="setFieldRole('${esc(f)}','back')">Hinten</button>
        <button class="field-action-btn ${role==='hidden'?'active-hide':''}" onclick="setFieldRole('${esc(f)}','hidden')">Aus</button>
      </div>
    </div>`;
  }

  let html = `<div style="margin-bottom:14px;font-size:13px;color:#8888aa;line-height:1.5">
    Tippe auf <b>Vorne/Hinten/Aus</b> um Felder zuzuweisen.<br>
    Ziehe <b>⠿</b> um die Reihenfolge anzupassen.
  </div>`;

  if(tempConfig.front.length){
    html += `<div class="sort-section-label">▶ Vorderseite</div>
    <div class="sortable-list" id="list-front">`;
    tempConfig.front.forEach((f,i) => html += fieldRow(f,'front',i,'front'));
    html += `</div>`;
  }

  if(tempConfig.back.length){
    html += `<div class="sort-section-label" style="margin-top:14px">↩ Rückseite</div>
    <div class="sortable-list" id="list-back">`;
    tempConfig.back.forEach((f,i) => html += fieldRow(f,'back',i,'back'));
    html += `</div>`;
  }

  if(tempConfig.hidden.length){
    html += `<div class="sort-section-label" style="margin-top:14px">✕ Versteckt</div>
    <div class="sortable-list" id="list-hidden">`;
    tempConfig.hidden.forEach((f,i) => html += fieldRow(f,'hidden',i,'hidden'));
    html += `</div>`;
  }

  document.getElementById('fieldContent').innerHTML = html;
}


function roleLabel(r){return r==='front'?'▶ Vorderseite':r==='back'?'↩ Rückseite':'✕ Versteckt'}

function setFieldRole(field, role){
  const deck = decks[editingDid];
  if(!Array.isArray(tempConfig.front)) tempConfig.front = tempConfig.front ? [tempConfig.front] : [];
  if(role==='front'){
    // Add to front array (toggle: if already front, remove it)
    if(tempConfig.front.includes(field)){
      // Already front - move to back instead
      tempConfig.front = tempConfig.front.filter(f=>f!==field);
      if(!tempConfig.back.includes(field)) tempConfig.back.push(field);
    } else {
      tempConfig.front.push(field);
      tempConfig.back = tempConfig.back.filter(f=>f!==field);
      tempConfig.hidden = tempConfig.hidden.filter(f=>f!==field);
    }
  } else if(role==='back'){
    tempConfig.front = tempConfig.front.filter(f=>f!==field);
    tempConfig.hidden = tempConfig.hidden.filter(f=>f!==field);
    if(!tempConfig.back.includes(field)) tempConfig.back.push(field);
  } else {
    tempConfig.front = tempConfig.front.filter(f=>f!==field);
    tempConfig.back = tempConfig.back.filter(f=>f!==field);
    if(!tempConfig.hidden.includes(field)) tempConfig.hidden.push(field);
  }
  renderFieldModal(deck.fields);
}

let dragSrc = null, dragSrcList = null;

function getListArray(listId){
  if(listId==='front') return tempConfig.front;
  if(listId==='back') return tempConfig.back;
  return tempConfig.hidden;
}

function dragStart(e){
  dragSrc = e.currentTarget;
  dragSrcList = dragSrc.dataset.list;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>dragSrc.style.opacity='0.4', 0);
}
function dragEnd(e){
  e.currentTarget.style.opacity='1';
  document.querySelectorAll('.sortable-item').forEach(el=>el.classList.remove('drag-over-item'));
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.sortable-item').forEach(el=>el.classList.remove('drag-over-item'));
  e.currentTarget.classList.add('drag-over-item');
}
function dragDrop(e){
  e.preventDefault();
  const target = e.currentTarget;
  if(target===dragSrc) return;
  const srcField = dragSrc.dataset.field;
  const tgtField = target.dataset.field;
  const srcList = dragSrc.dataset.list;
  const tgtList = target.dataset.list;
  // Remove from source
  const srcArr = getListArray(srcList);
  const srcIdx = srcArr.indexOf(srcField);
  if(srcIdx>-1) srcArr.splice(srcIdx,1);
  // Insert into target list at target position
  const tgtArr = getListArray(tgtList);
  const tgtIdx = tgtArr.indexOf(tgtField);
  tgtArr.splice(tgtIdx,0,srcField);
  // Update role if moved to different list
  if(srcList!==tgtList){
    // Already handled by array move above; role determined by which list
  }
  renderFieldModal(decks[editingDid].fields);
}

// Touch support for iOS
let touchItem=null, touchClone=null, touchList=null, touchStartY=0;
function touchStart(e){
  const item = e.currentTarget;
  // Only start drag if touching the handle
  const handle = item.querySelector('.field-drag');
  const touch = e.touches[0];
  const hr = handle.getBoundingClientRect();
  if(touch.clientX < hr.left-10 || touch.clientX > hr.right+10) return;
  e.preventDefault();
  touchItem = item;
  touchList = item.dataset.list;
  touchStartY = touch.clientY;
  // Create visual clone
  touchClone = item.cloneNode(true);
  touchClone.style.cssText = `position:fixed;left:${item.getBoundingClientRect().left}px;top:${item.getBoundingClientRect().top}px;width:${item.offsetWidth}px;opacity:0.85;z-index:999;pointer-events:none;background:#272734;border:1px solid #6e66ff;border-radius:14px;transition:none`;
  document.body.appendChild(touchClone);
  item.style.opacity='0.3';
}
function touchMove(e){
  if(!touchItem||!touchClone) return;
  e.preventDefault();
  const touch = e.touches[0];
  const dy = touch.clientY - touchStartY;
  const origTop = touchItem.getBoundingClientRect().top + dy - (touchClone.offsetTop - parseInt(touchClone.style.top));
  touchClone.style.top = (parseInt(touchClone.style.top)||0) + (touch.clientY - touchStartY - (touch.clientY - e.touches[0].clientY||0)) + 'px';
  // Recalc: just track absolute position
  touchClone.style.top = (touchItem.getBoundingClientRect().top + window.scrollY + dy) + 'px';
  // Find item under touch
  touchClone.style.display='none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  touchClone.style.display='';
  const overItem = el?.closest('.sortable-item');
  document.querySelectorAll('.sortable-item').forEach(i=>i.classList.remove('drag-over-item'));
  if(overItem && overItem!==touchItem) overItem.classList.add('drag-over-item');
}
function touchEnd(e){
  if(!touchItem||!touchClone) return;
  const touch = e.changedTouches[0];
  touchClone.style.display='none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  touchClone.remove();
  touchClone=null;
  touchItem.style.opacity='1';
  const overItem = el?.closest('.sortable-item');
  if(overItem && overItem!==touchItem){
    const srcField = touchItem.dataset.field;
    const tgtField = overItem.dataset.field;
    const srcList = touchItem.dataset.list;
    const tgtList = overItem.dataset.list;
    const srcArr = getListArray(srcList);
    const srcIdx = srcArr.indexOf(srcField);
    if(srcIdx>-1) srcArr.splice(srcIdx,1);
    const tgtArr = getListArray(tgtList);
    const tgtIdx = tgtArr.indexOf(tgtField);
    tgtArr.splice(tgtIdx,0,srcField);
  }
  touchItem=null;
  renderFieldModal(decks[editingDid].fields);
}

function startStudy(did){
  const deck = decks[did];
  if(!deck) return;
  sessionStats={again:0,hard:0,good:0,easy:0};
  const due=[],newCards=[];
  for(const c of deck.cards){
    const st=getState(c.nid,c.ord);
    if(!st) newCards.push(c);
    else if(isDue(st)) due.push(c);
  }
  shuffle(due);
  // New cards: ordered or random based on setting
  if(userSettings.newOrder === 'random') shuffle(newCards);
  const maxNew = userSettings.newPerDeck || 20;
  studyQueue=[...due,...newCards.slice(0, maxNew)];
  studyIdx=0;

  if(!studyQueue.length){showDone(true);showScreen('studyScreen');return}

  document.getElementById('studyTitle').textContent=deck.name.split('::').pop();
  showScreen('studyScreen');
  nextCard();
}

function nextCard(){
  if(studyIdx>=studyQueue.length){showDone(false);return}
  curCard=studyQueue[studyIdx];
  flipped=false;
  updateProgress();
  renderCard();
  renderAns(false);
}

function updateProgress(){
  const rem=studyQueue.length-studyIdx;
  document.getElementById('studyCount').textContent=rem+' übrig';
  const pct=studyIdx/studyQueue.length*100;
  document.getElementById('progFill').style.width=pct+'%';
}

function renderCard(){
  const c=curCard;
  const st=getState(c.nid,c.ord);
  const cfg=getFieldConfig(c.did);
  if(!Array.isArray(cfg.front)) cfg.front = cfg.front ? [cfg.front] : [];
  const frontFields = cfg.front.filter(f=>c.fields[f]!==undefined);
  if(!frontFields.length) frontFields.push(Object.keys(c.fields)[0]);
  const typeLabel=!st?'NEU':st.type===2?'WIEDERHOLUNG':'LERNEN';

  // Detect audio in any front field
  const frontAudio = frontFields.map(f=>extractAudio(c.fields[f]||'')).find(Boolean);

  const div=document.createElement('div');
  div.className='flashcard c-in';
  div.id='fcard';
  div.onclick=flipCard;

  // Render multiple front fields stacked
  const frontHtml = frontFields.map((f,i)=>{
    const val = removeAudioTags(c.fields[f]||'');
    const big = i===0;
    return '<div style="' + (i>0?'margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07)':'') + '">' + renderField(val,big) + '</div>';
  }).join('');

  div.innerHTML=`
    <div class="card-type-badge">${typeLabel}</div>
    ${frontAudio?`<button class="card-audio-btn" onclick="event.stopPropagation();playAudio('${frontAudio}')">🔊</button>`:''}
    <div class="card-main" style="width:100%">
      ${frontHtml}
    </div>
    <div class="tap-hint"><div class="tap-dot"></div>Tippen zum Aufdecken</div>
  `;

    const stage=document.getElementById('cardStage');
  stage.innerHTML='';
  stage.appendChild(div);
}

function flipCard(){
  if(flipped) return;
  flipped=true;
  const c=curCard;
  const cfg=getFieldConfig(c.did);
  const st=getState(c.nid,c.ord);

  const card=document.getElementById('fcard');
  card.onclick=null;
  card.querySelector('.tap-hint')?.remove();

  // Build back
  const backFields=cfg.back.filter(f=>!cfg.hidden.includes(f)&&c.fields[f]&&c.fields[f].trim());
  let backHtml='';
  for(const f of backFields){
    const val=c.fields[f];
    const audio=extractAudio(val);
    const cleanVal=removeAudioTags(val);
    const isBig=backFields.indexOf(f)===0;
    backHtml+=`<div class="back-field">
      <div class="back-field-label">${esc(f)}</div>
      <div class="back-field-val ${isBig?'big':''}">
        ${renderField(cleanVal,isBig)}
        ${audio?`<button class="card-audio-btn" style="position:static;display:inline-flex;margin-left:8px;vertical-align:middle;width:28px;height:28px;font-size:13px" onclick="playAudio('${audio}')">🔊</button>`:''}
      </div>
    </div>`;
  }
  if(!backHtml) backHtml='<div style="color:#4a4a66;font-size:14px">Keine weiteren Felder</div>';

  const divider=document.createElement('div');
  divider.className='card-divider';
  const backEl=document.createElement('div');
  backEl.className='back-fields';
  backEl.innerHTML=backHtml;

  card.appendChild(divider);
  card.appendChild(backEl);

  renderAns(true,st);
}

function renderAns(showRating,st){
  const wrap=document.getElementById('ansWrap');
  if(!showRating){
    wrap.innerHTML=`<button class="show-btn" onclick="flipCard()">Antwort zeigen</button>`;
    return;
  }
  const btns=[
    {k:'again',cls:'btn-again',l:'Nochmal'},
    {k:'hard', cls:'btn-hard', l:'Schwer'},
    {k:'good', cls:'btn-good', l:'Gut'},
    {k:'easy', cls:'btn-easy', l:'Leicht'},
  ];
  wrap.innerHTML=`<div class="rating-grid">${btns.map(b=>`
    <button class="r-btn ${b.cls}" onclick="rateCard('${b.k}')">
      <span class="r-lbl">${b.l}</span>
      <span class="r-int">${intervalLabel(st,R[b.k])}</span>
    </button>`).join('')}</div>`;
}

function rateCard(rk){
  const c=curCard;
  const rating=R[rk];
  const st=getState(c.nid,c.ord)||{};
  setState(c.nid,c.ord,schedule(st,rating));
  sessionStats[rk]++;
  schedulePush();

  // Re-queue if again
  if(rk==='again'&&studyQueue.length-studyIdx<8){
    studyQueue.splice(Math.min(studyIdx+3,studyQueue.length),0,c);
  }

  const card=document.getElementById('fcard');
  if(card){card.classList.remove('c-in');card.classList.add('c-out');card.style.pointerEvents='none'}
  studyIdx++;
  setTimeout(nextCard,230);
}

  document.getElementById('progFill').style.width='100%';

    ${total?`<div class="done-row">
      <div class="done-stat"><div class="done-stat-val" style="color:#ff4d6d">${sessionStats.again}</div><div class="done-stat-lbl">Nochmal</div></div>

// ══════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════
function extractAudio(val){
  if(!val) return null;
  // Handle [sound:file.mp3] format
  const m = val.match(/\[sound:([^\]]+)\]/);
  if(m) return m[1].trim();
  // Handle <audio src="..."> HTML format
  const m2 = val.match(/<audio[^>]+src="([^"]+)"/i);
  if(m2) return m2[1].trim();
  return null;
}
function removeAudioTags(val){
  return val?val.replace(/\[sound:[^\]]+\]/g,''):val;
}
function playAudio(filename){
  const decoded = decodeURIComponent(filename);
  const basename = filename.split('/').pop();
  const decodedBasename = decoded.split('/').pop();
  
  const url = mediaFiles[filename] 
           || mediaFiles[decoded]
           || mediaFiles[basename]
           || mediaFiles[decodedBasename];

  if(!url){
    toast('🔇 Datei nicht gefunden: ' + basename);
    console.warn('Audio not found:', filename, '| Available:', Object.keys(mediaFiles).join(', '));
    return;
  }
  
  // Check if format is supported on iOS
  const ext = basename.split('.').pop().toLowerCase();
  const supported = ['mp3','m4a','aac','wav','mp4','caf'];
  if(!supported.includes(ext)){
    toast('⚠️ Format nicht unterstützt: .' + ext + ' (iOS braucht .mp3/.m4a)');
    console.warn('Unsupported format:', ext, filename);
    return;
  }
  
  // Stop any currently playing audio
  if(window._currentAudio){
    window._currentAudio.pause();
    window._currentAudio.src = '';
    window._currentAudio = null;
  }

  // iOS Safari requires AudioContext to be resumed from a user gesture.
  // Since playAudio is always called from a tap handler, this should work.
  // Use a fresh Audio object each time.
  const audio = new Audio();
  audio.preload = 'auto';
  window._currentAudio = audio;
  
  // Set source and play
  audio.src = url;
  const playPromise = audio.play();
  if(playPromise !== undefined){
    playPromise.catch(e => {
      // Last resort: try via AudioContext
      fetch(url)
        .then(r => r.arrayBuffer())
        .then(buf => {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          return ctx.decodeAudioData(buf).then(decoded => {
            const src = ctx.createBufferSource();
            src.buffer = decoded;
            src.connect(ctx.destination);
            src.start(0);
          });
        })
        .catch(() => toast('🔇 Wiedergabe fehlgeschlagen'));
    });
  }
}

// ══════════════════════════════════════════════
//  FIELD RENDERING
// ══════════════════════════════════════════════
function sanitizeAnkiHtml(html) {
  // Aggressively strip all inline color/background/font styles from Anki HTML
  // so dark mode colors apply correctly
  
  // 1. Remove all color and background style properties entirely
  html = html.replace(/(?:color|background(?:-color)?|font-size|font-family)\s*:[^;"}]+[;]?/gi, '');
  
  // 2. Clean up leftover empty or broken style attributes
  html = html.replace(/style="[\s;]*"/gi, '');
  html = html.replace(/style="\s*;+\s*/gi, 'style="');
  
  // 3. Remove <font> tags entirely (old Anki format) but keep content
  html = html.replace(/<font[^>]*>/gi, '').replace(/<\/font>/gi, '');
  
  // 4. Fix images – resolve from mediaFiles
  html = html.replace(/<img([^>]*)src="([^"]+)"([^>]*?)\/?>/gi, (match, pre, src, post) => {
    const filename = src.split('/').pop();
    const url = mediaFiles[src] || mediaFiles[filename] || '';
    if(!url) return `<div style="font-size:11px;color:#8888aa;padding:6px 10px;border:1px dashed #4a4a66;border-radius:8px;display:inline-block">🖼 Bild nicht gefunden: ${esc(filename)}</div>`;
    return `<img${pre}src="${url}"${post} style="max-width:100%;border-radius:12px;display:block;margin:8px auto">`;
  });

  return html;
}

function renderField(val,big=false){
  if(!val) return '';
  val=removeAudioTags(val);
  if(!val.trim()) return '';

  // If HTML content – sanitize Anki's inline styles for dark mode
  if(/<[a-z]/i.test(val)){
    return `<div class="card-front-html">${sanitizeAnkiHtml(val)}</div>`;
  }
  // Plain text – auto-size
  const len=val.length;
  let sz;
  if(big){sz=len<=3?'72px':len<=6?'52px':len<=12?'36px':len<=24?'24px':'17px'}
  else{sz=len<=8?'22px':len<=30?'17px':'14px'}
  return `<span style="font-size:${sz};line-height:1.2;display:block">${esc(val)}</span>`;
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id))}
function goHome(){showScreen('homeScreen');renderHome()}

function openModal(id){
  const m=document.getElementById(id);
  m.classList.remove('hidden');
  m.style.display='flex';
}
function closeModal(id){
  const m=document.getElementById(id);
  m.classList.add('hidden');
}
// Close modals on backdrop click
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal(bg.id)});
});

let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3200);
}

function showLoader(msg){
  const ol=document.getElementById('loaderOverlay');
  ol.classList.remove('gone');
  setMsg(msg);
}
function hideLoader(){document.getElementById('loaderOverlay').classList.add('gone')}
function setMsg(m){const el=document.getElementById('loaderMsg');if(el)el.textContent=m}

// Drag & drop
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',async e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0];
  if(f&&(f.name.endsWith('.apkg')||f.name.endsWith('.colpkg'))) await importApkg(f);
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
async function runApp() {
  try {
    loadLocal();
    applyTheme();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{
      if(userSettings.theme === 'auto') applyTheme();
    });
    // Check libraries loaded
    if(typeof initSqlJs === 'undefined') throw new Error('sql.js nicht geladen – bitte Seite neu laden');
    if(typeof JSZip === 'undefined') throw new Error('JSZip nicht geladen – bitte Seite neu laden');
    setMsg('SQL laden…');
    await initSQL();
    setMsg('Bereit');
    hideLoader();
    renderHome();
    applyEditModeBtn();
    if(ghConfig.token && ghConfig.repo && ghConfig.user){
      ghPull().then(()=>renderHome()).catch(e=>console.warn('GH pull failed:', e));
    }
  } catch(err) {
    const ol = document.getElementById('loaderOverlay');
    const msg = document.getElementById('loaderMsg');
    if(msg) msg.textContent = '❌ ' + err.message;
    if(ol) {
      const btn = document.createElement('button');
      btn.textContent = '🔄 Neu laden';
      btn.style.cssText = 'margin-top:16px;padding:14px 28px;background:#6e66ff;color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit';
      btn.onclick = ()=>location.reload();
      ol.appendChild(btn);
    }
    console.error('Init error:', err);
  }
}

function getProgressSummary() {
  const keys = Object.keys(progress);
  const now = Date.now();
  let learned = 0, due = 0, new_ = 0, mature = 0;
  
  for(const k of keys) {
    const st = progress[k];
    if(!st) { new_++; continue; }
    if(st.type === 2 && st.interval >= 21) mature++;
    if(isDue(st)) due++;
    else learned++;
  }
  
  return { total: keys.length, learned, due, mature };
}

function renderProgressSummary() {
  const el = document.getElementById('progressSummary');
  if(!el) return;
  const s = getProgressSummary();
  const syncOk = ghConfig.token && ghConfig.repo && ghConfig.user;
  
  if(s.total === 0) {
    el.innerHTML = `<div style="font-size:13px;color:#8888aa;text-align:center;padding:8px 0">
      Noch kein Fortschritt gespeichert.<br>Fang an zu lernen! 🎌
    </div>`;
    return;
  }

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:#1e1b3a;border:1px solid #6e66ff;border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#a89fff">${s.total}</div>
        <div style="font-size:10px;color:#8888aa;margin-top:2px;text-transform:uppercase;letter-spacing:.5px">Gesamt</div>
      </div>
      <div style="background:#0e2a1e;border:1px solid #1a6644;border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#3ecf8e">${s.mature}</div>
        <div style="font-size:10px;color:#8888aa;margin-top:2px;text-transform:uppercase;letter-spacing:.5px">Gelernt (21+ Tage)</div>
      </div>
      <div style="background:#2d2010;border:1px solid #7a5510;border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#ffaa44">${s.due}</div>
        <div style="font-size:10px;color:#8888aa;margin-top:2px;text-transform:uppercase;letter-spacing:.5px">Fällig heute</div>
      </div>
      <div style="background:#0e2030;border:1px solid #1a5577;border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#4db8ff">${s.learned}</div>
        <div style="font-size:10px;color:#8888aa;margin-top:2px;text-transform:uppercase;letter-spacing:.5px">Nicht fällig</div>
      </div>
    </div>
    <div style="font-size:12px;padding:10px 12px;border-radius:10px;${syncOk ? 'background:#0e2a1e;color:#3ecf8e;border:1px solid #1a6644' : 'background:#2d2010;color:#ffaa44;border:1px solid #7a5510'}">
      ${syncOk ? '☁️ GitHub Sync aktiv – Fortschritt wird automatisch gesichert' : '⚠️ Kein GitHub Sync – bitte regelmäßig exportieren!'}
    </div>`;
}

function testProgressIntegrity() {
  // Export to JSON, parse it back, compare
  try {
    const json = JSON.stringify(progress);
    const parsed = JSON.parse(json);
    const originalKeys = Object.keys(progress).length;
    const parsedKeys = Object.keys(parsed).length;
    
    if(originalKeys !== parsedKeys) {
      toast('❌ Test fehlgeschlagen: ' + originalKeys + ' vs ' + parsedKeys + ' Einträge');
      return;
    }
    
    // Check a random entry
    const sampleKey = Object.keys(progress)[0];
    if(sampleKey && JSON.stringify(progress[sampleKey]) !== JSON.stringify(parsed[sampleKey])) {
      toast('❌ Daten-Integrität fehlgeschlagen');
      return;
    }
    
    const s = getProgressSummary();
    toast('✅ ' + originalKeys + ' Einträge OK – Backup ist sicher');
  } catch(e) {
    toast('❌ Test-Fehler: ' + e.message);
  }
}


// Wait for everything to be ready
if(document.readyState === 'complete') {
  runApp();
} else {
  window.addEventListener('load', runApp);
}
