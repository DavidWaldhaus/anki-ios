// Apply theme before first paint - no flash
(function(){

    var s = JSON.parse(localStorage.getItem('kj_settings_v1') || '{}');
    var t = s.theme || 'auto';
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  } catch(e) {}
})();
